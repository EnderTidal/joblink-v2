<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JobLink &mdash; Job Order Detail</title>
<link rel="stylesheet" href="/app.css">
<style>
  .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--blue); text-decoration:none; font-size:.9rem; margin-bottom:16px; }
  .back-link:hover { text-decoration:underline; }

  /* JO Header Card */
  .jo-header { position:relative; }
  .jo-header h1 { font-size:1.3rem; margin:0 0 4px; }
  .jo-meta { display:flex; flex-wrap:wrap; gap:14px; margin-top:8px; font-size:.88rem; color:var(--mut); }
  .jo-meta span { display:inline-flex; align-items:center; gap:4px; }
  .jo-meta strong { color:var(--ink); font-weight:600; }
  .edit-toggle { position:absolute; top:18px; right:18px; }

  /* Edit form inside header */
  .jo-edit-form { display:none; margin-top:14px; }
  .jo-edit-form.open { display:block; }
  .jo-edit-form .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .jo-edit-form .btn-row { display:flex; gap:8px; margin-top:12px; }

  /* Pipeline sections */
  .pipeline-section { border-radius:10px; padding:0; margin-bottom:14px; background:var(--card); overflow:hidden; }
  .pipeline-section-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; cursor:pointer; user-select:none; }
  .pipeline-section-header:hover { background:rgba(96,165,250,0.04); }
  .pipeline-section-header h2 { font-size:1rem; margin:0; display:flex; align-items:center; gap:8px; }
  .pipeline-section-body { padding:0 16px 14px; }
  .pipeline-badge { font-size:.78rem; font-weight:700; padding:2px 10px; border-radius:6px; }
  .badge-interested { background:rgba(96,165,250,0.15); color:var(--blue); }
  .badge-yeslisted { background:rgba(217,119,6,0.15); color:#d97706; }
  .badge-confirmed { background:rgba(34,197,94,0.15); color:#22c55e; }
  .badge-filled { background:rgba(139,92,246,0.15); color:#8b5cf6; }
  .badge-ruledout { background:rgba(148,163,184,0.15); color:#94a3b8; }
  .section-interested { border-left:4px solid var(--blue); }
  .section-yeslisted { border-left:4px solid #d97706; }
  .section-confirmed { border-left:4px solid #16a34a; }
  .section-filled { border-left:4px solid #8b5cf6; }
  .section-ruledout { border-left:4px solid #94a3b8; }

  /* Row action buttons */
  .row-btn { display:inline-flex; align-items:center; justify-content:center; height:28px; padding:0 10px; border:1px solid transparent; border-radius:6px; font-family:inherit; font-size:.78rem; font-weight:700; cursor:pointer; white-space:nowrap; transition:all .12s; }
  .row-btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn-yeslist { background:rgba(217,119,6,0.12); color:#d97706; }
  .btn-yeslist:hover { background:rgba(217,119,6,0.22); }
  .btn-confirm { background:rgba(34,197,94,0.12); color:#22c55e; }
  .btn-confirm:hover { background:rgba(34,197,94,0.22); }
  .btn-fill { background:rgba(139,92,246,0.12); color:#8b5cf6; }
  .btn-fill:hover { background:rgba(139,92,246,0.22); }
  .btn-ruleout { background:rgba(239,68,68,0.08); color:#ef4444; }
  .btn-ruleout:hover { background:rgba(239,68,68,0.18); }
  .btn-restore { background:rgba(148,163,184,0.1); color:#64748b; }
  .btn-restore:hover { background:rgba(148,163,184,0.2); }
  .act-group { display:inline-flex; gap:4px; flex-wrap:wrap; }

  .empty-msg { padding:12px 0; color:var(--mut); font-size:.86rem; }
</style>
</head>
<body>
<main class="page">
  <a href="/dashboard.html" class="back-link">&larr; Back to Dashboard</a>

  <!-- JO Header -->
  <div class="card jo-header" id="joHeader">
    <div id="joHeaderView"></div>
    <button class="btn sm ghost edit-toggle" id="editBtn" onclick="toggleEdit()">Edit</button>
    <div class="jo-edit-form" id="joEditForm">
      <div class="row2">
        <label class="f">Title<input name="title" id="fTitle"></label>
        <label class="f">Category<select name="category" id="fCategory"><option>Industrial</option><option>Administrative</option><option>Skilled Trade</option></select></label>
      </div>
      <div class="row2">
        <label class="f">Pay<input name="pay" id="fPay"></label>
        <label class="f">Shift / Hours<input name="shift_hours" id="fShift"></label>
      </div>
      <div class="row2">
        <label class="f">City / State<input name="city_state" id="fCityState"></label>
        <label class="f">Address <em style="font-weight:400;color:#94a3b8">(hidden)</em><input name="address" id="fAddress"></label>
      </div>
      <label class="f">Requirements<textarea name="requirements" id="fRequirements" rows="3"></textarea></label>
      <label class="f">Description<textarea name="description" id="fDescription" rows="3"></textarea></label>
      <div class="row2">
        <label class="f">Status<select name="status" id="fStatus"><option>Unpublished</option><option>Published</option><option>Complete</option></select></label>
        <label class="f">Assigned Recruiter<select name="assigned_recruiter" id="fRecruiter"><option value="">(none)</option></select></label>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="saveEdit()">Save Changes</button>
        <button class="btn ghost" onclick="toggleEdit()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Pipeline sections -->
  <div id="pipeline"></div>
</main>
<script src="/app.js?v=2"></script>
<script>
var joId = Number(new URLSearchParams(location.search).get('id'));
var joData = null;

if (!joId) { location.href = '/dashboard.html'; }

function renderHeader(jo) {
  document.title = 'JobLink \u2014 ' + jo.title;
  document.getElementById('joHeaderView').innerHTML =
    '<h1>' + esc(jo.title) + ' <span class="pill ' + jo.status + '" style="font-size:.78rem;vertical-align:middle">' + jo.status + '</span></h1>' +
    '<div class="jo-meta">' +
      '<span><strong>Category:</strong> ' + esc(jo.category || '\u2014') + '</span>' +
      '<span><strong>Pay:</strong> ' + esc(jo.pay || '\u2014') + '</span>' +
      '<span><strong>Shift:</strong> ' + esc(jo.shift_hours || '\u2014') + '</span>' +
      '<span><strong>Location:</strong> ' + esc(jo.city_state || '\u2014') + '</span>' +
      '<span><strong>Recruiter:</strong> ' + esc(jo.assigned_recruiter || '\u2014') + '</span>' +
    '</div>';
}

function populateEditForm(jo) {
  document.getElementById('fTitle').value = jo.title || '';
  document.getElementById('fCategory').value = jo.category || 'Industrial';
  document.getElementById('fPay').value = jo.pay || '';
  document.getElementById('fShift').value = jo.shift_hours || '';
  document.getElementById('fCityState').value = jo.city_state || '';
  document.getElementById('fAddress').value = jo.address || '';
  document.getElementById('fRequirements').value = jo.requirements || '';
  document.getElementById('fDescription').value = jo.description || '';
  document.getElementById('fStatus').value = jo.status || 'Unpublished';
  // Set recruiter after options are loaded
  var rSel = document.getElementById('fRecruiter');
  for (var i = 0; i < rSel.options.length; i++) {
    if (rSel.options[i].value === (jo.assigned_recruiter || '')) { rSel.selectedIndex = i; break; }
  }
}

function toggleEdit() {
  var form = document.getElementById('joEditForm');
  var isOpen = form.classList.contains('open');
  if (isOpen) {
    form.classList.remove('open');
    document.getElementById('editBtn').textContent = 'Edit';
  } else {
    populateEditForm(joData);
    form.classList.add('open');
    document.getElementById('editBtn').textContent = 'Cancel';
  }
}

async function saveEdit() {
  var data = {
    title: document.getElementById('fTitle').value,
    category: document.getElementById('fCategory').value,
    pay: document.getElementById('fPay').value,
    shift_hours: document.getElementById('fShift').value,
    city_state: document.getElementById('fCityState').value,
    address: document.getElementById('fAddress').value,
    requirements: document.getElementById('fRequirements').value,
    description: document.getElementById('fDescription').value,
    assigned_recruiter: document.getElementById('fRecruiter').value,
  };
  var newStatus = document.getElementById('fStatus').value;
  try {
    await api('/api/job-orders/' + joId, { method: 'PATCH', body: data });
    if (newStatus !== joData.status) {
      await api('/api/job-orders/' + joId + '/status', { method: 'POST', body: { status: newStatus } });
    }
    toast('Job order saved.');
    document.getElementById('joEditForm').classList.remove('open');
    document.getElementById('editBtn').textContent = 'Edit';
    loadDetail();
  } catch(e) { toast('Error: ' + e.message); }
}

function pipelineButtons(c) {
  var s = c.pipeline_status || 'interested';
  var btns = '';
  if (s === 'interested') {
    btns += '<button class="row-btn btn-yeslist" onclick="move(' + c.interest_id + ',\'yes_listed\')">Yes-List</button>';
    btns += '<button class="row-btn btn-ruleout" onclick="move(' + c.interest_id + ',\'ruled_out\')">Rule Out</button>';
  } else if (s === 'yes_listed') {
    btns += '<button class="row-btn btn-confirm" onclick="move(' + c.interest_id + ',\'confirmed\')">Confirm</button>';
    btns += '<button class="row-btn btn-restore" onclick="move(' + c.interest_id + ',\'interested\')">Back</button>';
    btns += '<button class="row-btn btn-ruleout" onclick="move(' + c.interest_id + ',\'ruled_out\')">Rule Out</button>';
  } else if (s === 'confirmed') {
    btns += '<button class="row-btn btn-fill" onclick="move(' + c.interest_id + ',\'filled\')">Fill</button>';
    btns += '<button class="row-btn btn-restore" onclick="move(' + c.interest_id + ',\'yes_listed\')">Back</button>';
    btns += '<button class="row-btn btn-ruleout" onclick="move(' + c.interest_id + ',\'ruled_out\')">Rule Out</button>';
  } else if (s === 'filled') {
    btns += '<button class="row-btn btn-restore" onclick="move(' + c.interest_id + ',\'confirmed\')">Undo Fill</button>';
  } else if (s === 'ruled_out') {
    btns += '<button class="row-btn btn-restore" onclick="move(' + c.interest_id + ',\'interested\')">Restore</button>';
  }
  return btns;
}

function renderSection(key, title, badgeCls, sectionCls, candidates) {
  var count = candidates ? candidates.length : 0;
  var html = '<div class="pipeline-section ' + sectionCls + '">';
  html += '<div class="pipeline-section-header" onclick="this.nextElementSibling.classList.toggle(\'open\')">';
  html += '<h2>' + title + ' <span class="pipeline-badge ' + badgeCls + '">' + count + '</span></h2>';
  html += '<span style="color:var(--mut);font-size:.82rem">\u25BC</span></div>';
  html += '<div class="pipeline-section-body' + (count > 0 ? ' open' : '') + '">';
  if (count === 0) {
    html += '<p class="empty-msg">No candidates in this stage.</p>';
  } else {
    html += '<table><thead><tr><th>Name</th><th>Phone</th><th>Category</th><th>Date</th><th>Actions</th></tr></thead><tbody>';
    candidates.forEach(function(c) {
      html += '<tr><td>' + esc(c.first_name) + ' ' + esc(c.last_name) + '</td>';
      html += '<td>' + esc(c.phone_display) + '</td>';
      html += '<td>' + esc(c.current_category || '\u2014') + '</td>';
      html += '<td>' + new Date(c.interest_date).toLocaleDateString() + '</td>';
      html += '<td class="act-group">' + pipelineButtons(c) + '</td></tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div></div>';
  return html;
}

function renderPipeline(jo) {
  var p = jo.pipeline || {};
  var html = '';
  html += renderSection('interested', 'Interested', 'badge-interested', 'section-interested', p.interested);
  html += renderSection('yes_listed', 'Yes-Listed', 'badge-yeslisted', 'section-yeslisted', p.yes_listed);
  html += renderSection('confirmed', 'Confirmed', 'badge-confirmed', 'section-confirmed', p.confirmed);
  html += renderSection('filled', 'Filled', 'badge-filled', 'section-filled', p.filled);
  html += renderSection('ruled_out', 'Ruled Out', 'badge-ruledout', 'section-ruledout', p.ruled_out);
  document.getElementById('pipeline').innerHTML = html;
}

async function move(interestId, newStatus) {
  try {
    await api('/api/interests/' + interestId + '/status', { method: 'PATCH', body: { status: newStatus } });
    var label = newStatus.replace('_', ' ');
    label = label.charAt(0).toUpperCase() + label.slice(1);
    toast('Moved to ' + label);
    loadDetail();
  } catch(e) { toast('Error: ' + e.message); }
}

async function loadRecruiterOptions() {
  try {
    var users = await api('/api/users');
    var sel = document.getElementById('fRecruiter');
    users.forEach(function(u) {
      var opt = document.createElement('option');
      opt.value = u.display_name || u.username;
      opt.textContent = (u.display_name || u.username) + ' (' + u.role + ')';
      if (joData && (joData.assigned_recruiter || '') === (u.display_name || u.username)) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch(e) { /* non-admin */ }
}

async function loadDetail() {
  try {
    joData = await api('/api/job-orders/' + joId);
    renderHeader(joData);
    renderPipeline(joData);
  } catch(e) {
    document.getElementById('joHeaderView').innerHTML = '<h1>Job Order Not Found</h1><p class="mut">This job order may have been deleted.</p>';
  }
}

boot('dash').then(function() { loadDetail(); loadRecruiterOptions(); });
</script>
</body></html>
