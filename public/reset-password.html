<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JobLink — Reset Password</title>
<script>(function(){if(localStorage.getItem("joblink_light_mode")==="true"){document.documentElement.classList.add("light-mode")}})();</script>
<link rel="stylesheet" href="/app.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login { width:360px; }
  .login h1 { color:var(--blue); text-align:center; margin-bottom:6px; }
  .login p.sub { text-align:center; color:var(--mut); font-size:.88rem; margin-bottom:18px; }
  .err { color:#b3261e; font-size:.86rem; margin-bottom:10px; display:none; }
  .success { color:#22c55e; font-size:.88rem; text-align:center; }
</style></head>
<body>
<div class="card login">
  <h1>JobLink</h1>
  <p class="sub">Reset your password</p>
  <div class="err" id="err"></div>
  <form id="f">
    <label class="f">New Password (min 8 chars)<input id="pw" type="password" autocomplete="new-password" required minlength="8"></label>
    <label class="f">Confirm Password<input id="pw2" type="password" autocomplete="new-password" required minlength="8"></label>
    <button class="btn" style="width:100%" type="submit">Reset Password</button>
  </form>
  <div class="success" id="ok" style="display:none">
    <p>Password reset successfully.</p>
    <p><a href="/login.html" style="color:var(--blue)">Go to login</a></p>
  </div>
</div>
<script src="/app.js?v=2"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('err').style.display = 'block';
  document.getElementById('err').textContent = 'No reset token found.';
  document.getElementById('f').style.display = 'none';
}

document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  document.getElementById('err').style.display = 'none';
  if (pw !== pw2) {
    document.getElementById('err').style.display = 'block';
    document.getElementById('err').textContent = 'Passwords do not match.';
    return;
  }
  try {
    const r = await api('/api/reset-password', { method: 'POST', body: { token, password: pw } });
    if (r.ok) {
      document.getElementById('f').style.display = 'none';
      document.getElementById('ok').style.display = 'block';
    } else throw new Error(r.error);
  } catch (err) {
    document.getElementById('err').style.display = 'block';
    document.getElementById('err').textContent = err.message;
  }
});
</script>
</body></html>
