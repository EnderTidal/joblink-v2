<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JobLink — Admin</title>
<link rel="stylesheet" href="/app.css">
<style>
  .tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .tabs button { background:#161b22; border:1px solid var(--line); border-radius:8px; padding:8px 16px; cursor:pointer; color:var(--ink); }
  .tabs button.on { background:var(--blue); color:#fff; border-color:var(--blue); }
  section { display:none; } section.on { display:block; }
  .half { max-width:520px; }
  .edit-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; padding:10px 0; border-bottom:1px solid var(--line); }
  .edit-row input, .edit-row select { height:32px; padding:0 8px; border:1px solid var(--line); border-radius:6px; background:var(--bg); color:var(--ink); font-family:inherit; font-size:.85rem; }
  .edit-row input { width:130px; }
  .edit-row select { width:110px; }
  .edit-row .user-label { font-weight:600; min-width:80px; }
  .whippy-users-badge { display:inline-block; background:rgba(34,197,94,0.15); color:#22c55e; font-size:.78rem; font-weight:700; padding:2px 9px; border-radius:6px; margin-left:8px; }
  .verified-badge { display:inline-block; background:rgba(34,197,94,0.15); color:#22c55e; font-size:.75rem; font-weight:700; padding:1px 7px; border-radius:4px; }
  .unverified-badge { display:inline-block; background:rgba(239,68,68,0.1); color:#ef4444; font-size:.75rem; font-weight:700; padding:1px 7px; border-radius:4px; }
  .invite-section { border-top:1px solid var(--line); margin-top:14px; padding-top:14px; }
  .invite-section h4 { margin:0 0 10px; font-size:.92rem; }
  .divider-or { display:flex; align-items:center; margin:14px 0; gap:10px; }
  .divider-or span { color:var(--mut); font-size:.82rem; }
  .divider-or hr { flex:1; border:0; border-top:1px solid var(--line); }
</style></head>
<body>
<main class="page">
  <h1 class="pagetitle">Admin</h1>
  <div class="tabs" id="tabs">
    <button data-t="settings" class="on">Settings</button>
    <button data-t="templates">Templates</button>
    <button data-t="users">Users</button>
    <button data-t="candidates">Candidates</button>
    <button data-t="feedback">Feedback</button>
    <button data-t="changelog">Changelog</button>
  </div>

  <section id="s-settings" class="on"><div class="card half">
    <h3 style="margin-bottom:12px">Settings</h3>
    <label class="f">Blast Guard cooldown (hours) <input id="set-cooldown" type="number" min="0"></label>
    <label class="f">SMS provider
      <select id="set-provider">
        <option value="mock">Mock (safe — no real texts)</option>
        <option value="whippy">Whippy</option>
      </select>
    </label>
    <label class="f">Whippy API key <input id="set-wkey" placeholder="X-WHIPPY-KEY"></label>
    <label class="f">Whippy channel ID <input id="set-wchan"></label>
    <label class="f">Whippy from-number <input id="set-wfrom" placeholder="+1..."></label>
    <div class="row" style="gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="saveSettings()">Save</button>
      <button class="btn ghost" onclick="testSms()">Test connection</button>
      <button class="btn ghost" onclick="syncWhippyUsers()">Sync Whippy Users</button>
      <button class="btn ghost" onclick="rerunSetup()">Re-run setup wizard</button>
    </div>
    <div id="whippy-users-info" style="margin-top:10px"></div>
  </div></section>

  <section id="s-templates"><div class="card half">
    <h3 style="margin-bottom:12px">Blast message templates</h3>
    <p class="mut" style="margin-bottom:10px">Placeholders: {first_name} and {link}. {link} is required.</p>
    <div id="tpl-list"></div>
    <hr style="border:0;border-top:1px solid var(--line);margin:14px 0">
    <label class="f">Name <input id="tpl-name"></label>
    <label class="f">Category
      <select id="tpl-cat">
        <option value="">All (global)</option>
        <option value="Industrial">Industrial</option>
        <option value="Administrative">Administrative</option>
        <option value="Skilled Trade">Skilled Trades</option>
      </select>
    </label>
    <label class="f">Body <textarea id="tpl-body" rows="3"></textarea></label>
    <button class="btn" onclick="addTemplate()">Add template</button>
  </div></section>

  <section id="s-users"><div class="card half">
    <h3 style="margin-bottom:12px">Users</h3>
    <div id="user-list"></div>

    <div class="invite-section">
      <h4>Invite New User</h4>
      <p class="mut" style="font-size:.84rem;margin-bottom:10px">Send an invitation email. They'll set their own password.</p>
      <label class="f">Email <input id="inv-email" type="email" placeholder="user@company.com"></label>
      <label class="f">Role <select id="inv-role"><option value="recruiter">Recruiter</option><option value="admin">Admin</option></select></label>
      <button class="btn" onclick="inviteUser()">Send Invitation</button>
    </div>

    <div class="divider-or"><hr><span>or add manually</span><hr></div>

    <label class="f">Username <input id="u-name"></label>
    <label class="f">Email <input id="u-email" type="email" placeholder="optional"></label>
    <label class="f">Password <input id="u-pass" type="password"></label>
    <label class="f">Role <select id="u-role"><option value="recruiter">Recruiter</option><option value="admin">Admin</option></select></label>
    <button class="btn ghost" onclick="addUser()">Add user manually</button>
  </div></section>

  <section id="s-candidates"><div class="card">
    <h3 style="margin-bottom:12px">Candidates</h3>
    <div class="row" style="margin-bottom:12px"><input id="cand-q" placeholder="Search name or phone..." style="max-width:300px"><button class="btn" onclick="loadCandidates()">Search</button></div>
    <table><thead><tr><th>Name</th><th>Phone</th><th>Category</th><th>Last blast</th><th>Blasts</th><th>DNC</th></tr></thead><tbody id="cand-rows"></tbody></table>
  </div></section>

  <section id="s-feedback"><div class="card half">
    <h3 style="margin-bottom:12px">Feedback</h3>
    <label class="f">Leave feedback <textarea id="fb-body" rows="3"></textarea></label>
    <button class="btn" onclick="sendFeedback()">Submit</button>
    <div id="fb-list" style="margin-top:14px"></div>
  </div></section>

  <section id="s-changelog"><div class="card half">
    <h3 style="margin-bottom:12px">Changelog</h3>
    <div id="cl-list"></div>
    <div id="cl-form" style="display:none">
      <hr style="border:0;border-top:1px solid var(--line);margin:14px 0">
      <label class="f">Version <input id="cl-version" placeholder="2.0.1"></label>
      <label class="f">Notes <textarea id="cl-notes" rows="3"></textarea></label>
      <button class="btn" onclick="addChangelog()">Post</button>
    </div>
  </div></section>
</main>
<script src="/app.js?v=2"></script>
<script>
let me = null;

document.querySelectorAll('#tabs button').forEach((b) => b.addEventListener('click', () => {
  document.querySelectorAll('#tabs button').forEach((x) => x.classList.remove('on'));
  document.querySelectorAll('section').forEach((x) => x.classList.remove('on'));
  b.classList.add('on');
  document.getElementById('s-' + b.dataset.t).classList.add('on');
}));

async function loadSettings() {
  try {
    const s = await api('/api/settings');
    document.getElementById('set-cooldown').value = s.cooldown_hours || 72;
    document.getElementById('set-provider').value = s.sms_provider || 'mock';
    document.getElementById('set-wkey').value = s.whippy_api_key || '';
    document.getElementById('set-wchan').value = s.whippy_channel_id || '';
    document.getElementById('set-wfrom').value = s.whippy_from_number || '';
    // Show cached Whippy users count
    if (s.whippy_users && s.whippy_users.length > 0) {
      document.getElementById('whippy-users-info').innerHTML =
        '<span class="whippy-users-badge">' + s.whippy_users.length + ' Whippy users synced</span> ' +
        s.whippy_users.map(function(u) { return esc(u.name); }).join(', ');
    }
  } catch { document.getElementById('s-settings').innerHTML = '<div class="card half mut">Settings are admin-only.</div>'; }
}
async function saveSettings() {
  await api('/api/settings', { method: 'POST', body: {
    cooldown_hours: document.getElementById('set-cooldown').value,
    sms_provider: document.getElementById('set-provider').value,
    whippy_api_key: document.getElementById('set-wkey').value,
    whippy_channel_id: document.getElementById('set-wchan').value,
    whippy_from_number: document.getElementById('set-wfrom').value,
  }});
  toast('Settings saved.');
}
async function testSms() {
  const r = await api('/api/settings/test-sms', { method: 'POST' });
  if (r.ok) {
    let msg = '\u2713 ' + r.provider + ' connection OK' + (r.mock ? ' (mock mode)' : '');
    if (r.whippy_users_synced) msg += ' \u2014 ' + r.whippy_users_count + ' Whippy users synced';
    toast(msg);
    loadSettings(); // refresh to show synced users
  } else {
    toast('\u2717 ' + r.error);
  }
}
async function syncWhippyUsers() {
  try {
    const r = await api('/api/settings/sync-whippy-users', { method: 'POST' });
    if (r.ok) {
      toast('\u2713 Synced ' + r.count + ' Whippy users');
      loadSettings();
    } else {
      toast('\u2717 ' + (r.error || 'Sync failed'));
    }
  } catch (e) { toast(e.message); }
}
async function rerunSetup() {
  await api('/api/onboarding/reset', { method: 'POST' });
  location.href = '/onboarding.html';
}

async function loadTemplates() {
  const list = await api('/api/templates');
  document.getElementById('tpl-list').innerHTML = list.map((t) => {
    const catLabel = t.category ? t.category : 'All';
    const defaultLabel = t.is_default ? ' <span style="color:#22c55e;font-weight:700">(default' + (t.category ? ' for ' + esc(t.category) : '') + ')</span>' : '';
    const adminBtns = me?.role === 'admin' ? [
      !t.is_default ? '<button class="btn sm" onclick="setDefault(' + t.id + ')">Set as default</button>' : '',
      '<select class="sort-select" style="height:28px;font-size:.78rem" onchange="setCat(' + t.id + ', this.value)">' +
        '<option value=""' + (!t.category ? ' selected' : '') + '>All</option>' +
        '<option value="Industrial"' + (t.category === 'Industrial' ? ' selected' : '') + '>Industrial</option>' +
        '<option value="Administrative"' + (t.category === 'Administrative' ? ' selected' : '') + '>Administrative</option>' +
        '<option value="Skilled Trade"' + (t.category === 'Skilled Trade' ? ' selected' : '') + '>Skilled Trades</option>' +
      '</select>',
      !t.is_default ? '<button class="btn sm ghost" onclick="delTemplate(' + t.id + ')">Delete</button>' : '',
    ].filter(Boolean).join(' ') : '';
    return '<div style="margin-bottom:12px;padding:10px 0;border-bottom:1px solid var(--line)">' +
      '<strong>' + esc(t.name) + '</strong> <span class="mut">(' + catLabel + ')</span>' + defaultLabel +
      '<div class="mut" style="margin:4px 0">' + esc(t.body) + '</div>' +
      '<div class="row" style="gap:6px;margin-top:6px">' + adminBtns + '</div></div>';
  }).join('');
}
async function addTemplate() {
  try {
    const cat = document.getElementById('tpl-cat').value;
    await api('/api/templates', { method: 'POST', body: { name: document.getElementById('tpl-name').value, body: document.getElementById('tpl-body').value, category: cat || null } });
    toast('Template added.'); loadTemplates();
  } catch (e) { toast(e.message); }
}
async function delTemplate(id) { await api('/api/templates/' + id, { method: 'DELETE' }); loadTemplates(); }
async function setDefault(id) { await api('/api/templates/' + id + '/default', { method: 'PUT' }); toast('Default updated.'); loadTemplates(); }
async function setCat(id, cat) { await api('/api/templates/' + id, { method: 'PATCH', body: { category: cat || null } }); toast('Category updated.'); loadTemplates(); }

let editingUserId = null;

async function loadUsers() {
  try {
    const list = await api('/api/users');
    document.getElementById('user-list').innerHTML = list.map((u) => {
      const emailDisplay = u.email ? esc(u.email) : '<span class="mut">no email</span>';
      const verifiedBadge = u.email ? (u.email_verified ? '<span class="verified-badge">verified</span>' : '<span class="unverified-badge">pending</span>') : '';
      return '<div class="edit-row" id="user-row-' + u.id + '">' +
        '<span class="user-label">' + esc(u.username) + '</span>' +
        '<span class="mut" style="font-size:.84rem">' + emailDisplay + '</span>' +
        verifiedBadge +
        '<span class="mut" style="font-size:.82rem">' + esc(u.display_name || '') + '</span>' +
        '<span class="mut" style="font-size:.82rem">' + u.role + '</span>' +
        '<button class="btn sm ghost" onclick="editUser(' + u.id + ')">Edit</button>' +
        '<button class="btn sm ghost" onclick="resetPass(' + u.id + ', \'' + esc(u.username) + '\')">Reset password</button>' +
      '</div>';
    }).join('');
  } catch { document.getElementById('s-users').innerHTML = '<div class="card half mut">User management is admin-only.</div>'; }
}

function editUser(id) {
  // Find the row and replace with inline edit fields
  const row = document.getElementById('user-row-' + id);
  if (!row) return;
  // Fetch current user data
  api('/api/users').then((list) => {
    const u = list.find((x) => x.id === id);
    if (!u) return;
    row.innerHTML =
      '<input id="edit-display-' + id + '" value="' + esc(u.display_name || '') + '" placeholder="Display name">' +
      '<input id="edit-username-' + id + '" value="' + esc(u.username) + '" placeholder="Username">' +
      '<input id="edit-email-' + id + '" value="' + esc(u.email || '') + '" placeholder="Email" type="email">' +
      '<select id="edit-role-' + id + '">' +
        '<option value="admin"' + (u.role === 'admin' ? ' selected' : '') + '>Admin</option>' +
        '<option value="recruiter"' + (u.role === 'recruiter' ? ' selected' : '') + '>Recruiter</option>' +
      '</select>' +
      '<button class="btn sm" onclick="saveUser(' + id + ')">Save</button>' +
      '<button class="btn sm ghost" onclick="loadUsers()">Cancel</button>';
  });
}

async function saveUser(id) {
  try {
    const display_name = document.getElementById('edit-display-' + id).value;
    const username = document.getElementById('edit-username-' + id).value;
    const email = document.getElementById('edit-email-' + id).value;
    const role = document.getElementById('edit-role-' + id).value;
    await api('/api/users/' + id, { method: 'PATCH', body: { display_name, username, email: email || null, role } });
    toast('User updated.');
    loadUsers();
  } catch (e) { toast(e.message); }
}

async function inviteUser() {
  const email = document.getElementById('inv-email').value;
  const role = document.getElementById('inv-role').value;
  if (!email) { toast('Email required.'); return; }
  try {
    const r = await api('/api/invite', { method: 'POST', body: { email, role } });
    toast(r.message || 'Invitation sent!');
    document.getElementById('inv-email').value = '';
    loadUsers();
  } catch (e) { toast(e.message); }
}

async function addUser() {
  try {
    await api('/api/users', { method: 'POST', body: {
      username: document.getElementById('u-name').value,
      password: document.getElementById('u-pass').value,
      email: document.getElementById('u-email').value || null,
      role: document.getElementById('u-role').value
    }});
    toast('User added.'); loadUsers();
  } catch (e) { toast(e.message); }
}
async function resetPass(id, name) {
  const p = prompt('New password for ' + name + ':');
  if (!p) return;
  await api('/api/users/' + id + '/password', { method: 'POST', body: { password: p } });
  toast('Password updated.');
}

async function loadCandidates() {
  const q = document.getElementById('cand-q').value;
  const rows = await api('/api/candidates?q=' + encodeURIComponent(q));
  document.getElementById('cand-rows').innerHTML = rows.map((c) => `
    <tr><td>${esc(c.first_name)} ${esc(c.last_name)}</td><td>${esc(c.phone_display)}</td>
    <td>${esc(c.current_category || '\u2014')}</td>
    <td>${c.last_blast ? new Date(c.last_blast).toLocaleDateString() : '\u2014'}</td>
    <td>${c.blast_count}</td>
    <td><button class="btn sm ${c.do_not_contact ? '' : 'ghost'}" onclick="toggleDnc('${c.phone}', ${c.do_not_contact ? 'false' : 'true'})">${c.do_not_contact ? 'DNC \u2713' : 'Mark DNC'}</button></td></tr>`).join('')
    || '<tr><td colspan="6" class="mut">No candidates yet.</td></tr>';
}
async function toggleDnc(phone, value) {
  await api('/api/candidates/' + phone + '/dnc', { method: 'POST', body: { value } });
  toast(value ? 'Marked do-not-contact (never blasted again).' : 'Do-not-contact removed.');
  loadCandidates();
}

async function sendFeedback() {
  await api('/api/feedback', { method: 'POST', body: { body: document.getElementById('fb-body').value } });
  document.getElementById('fb-body').value = '';
  toast('Thanks \u2014 feedback recorded and emailed.'); loadFeedback();
}
async function loadFeedback() {
  try {
    const list = await api('/api/feedback');
    document.getElementById('fb-list').innerHTML = list.map((f) =>
      '<div style="margin-bottom:8px"><span class="mut">' + esc(f.author || 'anon') + ' \u00b7 ' + new Date(f.created_at).toLocaleDateString() + '</span><div>' + esc(f.body) + '</div></div>').join('');
  } catch { /* recruiters can post but not read — fine */ }
}

async function loadChangelog() {
  const list = await api('/api/changelog');
  document.getElementById('cl-list').innerHTML = list.map((c) =>
    '<div style="margin-bottom:10px"><strong>v' + esc(c.version) + '</strong> <span class="mut">' + new Date(c.created_at).toLocaleDateString() + '</span><div>' + esc(c.notes) + '</div></div>').join('')
    || '<div class="mut">No entries yet.</div>';
  // Changelog post form: admin-only
  if (me?.role === 'admin') document.getElementById('cl-form').style.display = 'block';
  else document.getElementById('cl-form').style.display = 'none';
}
async function addChangelog() {
  await api('/api/changelog', { method: 'POST', body: { version: document.getElementById('cl-version').value, notes: document.getElementById('cl-notes').value } });
  toast('Posted.'); loadChangelog();
}

boot('admin').then((m) => {
  me = m;
  loadSettings(); loadTemplates(); loadUsers(); loadCandidates(); loadFeedback(); loadChangelog();
});
</script>
</body></html>
