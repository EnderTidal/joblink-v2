<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JobLink &mdash; AI Assistant</title>
<script>(function(){if(localStorage.getItem("joblink_light_mode")==="true"){document.documentElement.classList.add("light-mode")}})();</script>
<link rel="stylesheet" href="/app.css?v=4">
<style>
  .paths { justify-content: center; display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px; }
  .paths button { display:flex;flex-direction:column;gap:8px;align-items:flex-start;text-align:left;padding:18px;border:1px solid var(--border);background:var(--surface); border-radius:var(--radius); cursor:pointer;
    font-size:.95rem; font-weight:600; color:var(--text); transition:border-color .15s, background .15s; }
  .paths button:hover { border-color:var(--brand); }
  .paths button.on { border-color:var(--brand); background:var(--brand-soft); }
  #chat { display:flex; flex-direction:column; gap:10px; min-height:300px; }
  .msg { max-width:78%; padding:12px 15px; border-radius:14px; white-space:pre-wrap; font-size:.94rem; line-height:1.45; }
  .msg.tom { background:var(--surface-2); border:1px solid var(--border); align-self:flex-start; border-bottom-left-radius:4px; }
  .msg.me { background:var(--brand); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
  .msg .choices { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  #composer { display:flex; gap:8px; margin-top:14px; }
  #composer textarea { flex:1; resize:vertical; min-height:46px; max-height:160px; }
  .hint { text-align:center; margin:40px 0; color:var(--text-muted); }

  /* Full-width JO form panel (replaces chat after AI parse) */
  #jo-form-panel { display:none; }
  #jo-form-panel.active { display:block; }
  #jo-form-panel .jo-form { display:flex; flex-direction:column; gap:12px; }
  #jo-form-panel .jo-field { display:flex; flex-direction:column; gap:3px; }
  #jo-form-panel label { font-size:.82rem; color:var(--text-muted); font-weight:600; }
  #jo-form-panel label .vis { font-weight:400; font-style:italic; font-size:.75rem; }
  #jo-form-panel input, #jo-form-panel textarea, #jo-form-panel select { background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    padding:8px 10px; border-radius:6px; font-size:.9rem; font-family:inherit; }
  #jo-form-panel textarea { min-height:70px; resize:vertical; }
  #jo-form-panel input:focus, #jo-form-panel textarea:focus, #jo-form-panel select:focus { border-color:var(--brand); outline:none; }
  #jo-form-panel .form-actions { display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
  #jo-form-panel .form-warn { color:var(--amber); font-size:.82rem; margin-top:4px; }
  #jo-form-panel .form-title { font-size:1.05rem; font-weight:700; margin-bottom:4px; }

  /* Blast settings form panel */
  #blast-form-panel { display:none; }
  #blast-form-panel.active { display:block; }
  .bf-title { font-size:1.05rem; font-weight:700; margin-bottom:4px; }
  .bf-stat { font-size:.88rem; color:var(--text-muted); margin-bottom:12px; }
  .bf-stat strong { color:var(--text); }
  .bf-form { display:flex; flex-direction:column; gap:14px; }
  .bf-field { display:flex; flex-direction:column; gap:4px; }
  .bf-field label { font-size:.82rem; color:var(--text-muted); font-weight:600; }
  .bf-field input, .bf-field textarea, .bf-field select { background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    padding:8px 10px; border-radius:6px; font-size:.9rem; font-family:inherit; }
  .bf-field textarea { min-height:90px; resize:vertical; }
  .bf-field input:focus, .bf-field textarea:focus, .bf-field select:focus { border-color:var(--brand); outline:none; }
  .bf-radio-group { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .bf-radio-group label { font-size:.88rem; color:var(--text); font-weight:400; cursor:pointer; display:flex; align-items:center; gap:4px; }
  .bf-radio-group input[type="radio"] { width:auto; margin:0; }
  .bf-radio-group input[type="number"] { width:80px; padding:6px 8px; }
  .bf-btn-group { display:flex; gap:6px; flex-wrap:wrap; }
  .bf-btn-group button { padding:8px 16px; border:1px solid var(--border); background:var(--surface); border-radius:8px; cursor:pointer;
    font-size:.88rem; font-weight:600; color:var(--text); transition:border-color .15s, background .15s; }
  .bf-btn-group button:hover { border-color:var(--brand); }
  .bf-btn-group button.selected { border-color:var(--brand); background:var(--brand-soft); color:var(--brand); }
  .bf-preview-box { background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:10px 12px;
    font-size:.85rem; color:var(--text-muted); white-space:pre-wrap; line-height:1.4; margin-top:4px; }
  .bf-save-link { display:inline-block; margin-top:4px; color:var(--brand); cursor:pointer; font-size:.82rem; text-decoration:underline; }
  .bf-save-link:hover { color:var(--brand); }
  .bf-actions { display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
  .bf-warn { color:var(--amber); font-size:.82rem; margin-top:4px; }

  /* Blast review cards */
  .blast-card { background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:10px 12px;
    margin-top:6px; cursor:pointer; transition:border-color .15s; }
  .blast-card:hover { border-color:var(--brand); }
  .blast-card .bc-header { font-weight:600; font-size:.9rem; }
  .blast-card .bc-meta { font-size:.8rem; color:var(--text-muted); margin-top:2px; }
  .blast-recipients { margin-top:8px; font-size:.85rem; }
  .blast-recipients table { width:100%; border-collapse:collapse; margin-top:4px; }
  .blast-recipients th, .blast-recipients td { text-align:left; padding:3px 6px; border-bottom:1px solid var(--border); font-size:.82rem; }
  .blast-recipients th { color:var(--text-muted); font-weight:600; }
  .blast-recipients .csv-link { display:inline-block; margin-top:6px; color:var(--brand); text-decoration:underline; cursor:pointer; font-size:.82rem; }

  /* Expandable recipient list */
  .recipient-toggle { background:none; border:1px solid var(--border); color:var(--brand); padding:6px 10px;
    border-radius:6px; cursor:pointer; font-size:.82rem; margin-top:8px; }
  .recipient-toggle:hover { border-color:var(--brand); }
  .recipient-list { margin-top:6px; font-size:.82rem; max-height:300px; overflow-y:auto; }
  .recipient-list .rl-row { padding:2px 0; border-bottom:1px solid var(--border); }

  .loading-indicator { display:flex; align-items:center; gap:8px; padding:12px 16px; color:var(--text-subtle); font-size:.9rem; }
  .loading-indicator .dots { display:inline-flex; gap:4px; }
  .loading-indicator .dots span { width:8px; height:8px; border-radius:50%; background:var(--brand); animation:bounce 1.4s infinite ease-in-out both; }
  .loading-indicator .dots span:nth-child(1) { animation-delay:-0.32s; }
  .loading-indicator .dots span:nth-child(2) { animation-delay:-0.16s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

  /* Drag-and-drop overlay */
  .drop-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6);
    z-index:9999; align-items:center; justify-content:center; flex-direction:column; backdrop-filter:blur(2px); transition:opacity .15s; }
  .drop-overlay.active { display:flex; }
  .drop-overlay-box { background:var(--surface); border:3px dashed var(--brand); border-radius:20px; padding:48px 64px;
    text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.4); transition:transform .15s; }
  .drop-overlay.active .drop-overlay-box { animation:dropPulse .3s ease; }
  @keyframes dropPulse { 0%{transform:scale(.95);opacity:.7} 100%{transform:scale(1);opacity:1} }
  .drop-overlay-icon { margin-bottom:16px; color:var(--brand); }
  .drop-overlay-title { font-size:18px; font-weight:700; color:var(--brand); }
  .drop-overlay-sub { font-size:14px; color:var(--text-subtle); margin-top:6px; }

  /* Blank form link */
  .blank-form-link { display:inline-block; margin-top:8px; color:var(--brand); cursor:pointer; font-size:.85rem; text-decoration:underline; }
  .blank-form-link:hover { color:var(--brand-strong); }

  /* Save template modal */
  .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6);
    z-index:9998; align-items:center; justify-content:center; }
  .modal-overlay.active { display:flex; }
  .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; min-width:340px; max-width:440px; }
  .modal-box h3 { margin:0 0 12px 0; font-size:1rem; }
  .modal-box .bf-field { margin-bottom:10px; }
  .modal-box .bf-actions { margin-top:14px; }

  /* Tom light mode */

</style></head>
<body>
<main class="page">
  <h1 class="pagetitle">AI Assistant</h1><p class="mut" style="margin:0 0 24px">Pick a task to start 2014 each conversation handles one job at a time.</p>
  <div class="paths" id="paths">
    <button data-path="job_order"><span style="font-size:14px;font-weight:700">New Job Order</span><span style="font-size:12px;color:var(--text-subtle);font-weight:500">Draft a JO fast</span></button>
    <button data-path="blast"><span style="font-size:14px;font-weight:700">Send Magic Blast</span><span style="font-size:12px;color:var(--text-subtle);font-weight:500">Text matched candidates</span></button>
    <button data-path="review"><span style="font-size:14px;font-weight:700">Review Magic Blasts</span><span style="font-size:12px;color:var(--text-subtle);font-weight:500">See what went out</span></button>
    <button data-path="help"><span style="font-size:14px;font-weight:700">Help / Tutorial / FAQ</span><span style="font-size:12px;color:var(--text-subtle);font-weight:500">Learn the basics</span></button>
  </div>
  <div class="card">
    <div id="jo-form-panel"></div>
    <div id="blast-form-panel"></div>
    <div id="chat"><div class="hint">Pick a button above to start. One task per conversation &mdash; switching tasks starts a fresh one.</div></div>
    <div id="composer" style="display:none">
      <button class="btn ghost" id="attach" title="Upload a file">&#x1F4CE;</button>
      <input type="file" id="fileinput" style="display:none" accept=".docx,.doc,.txt,.csv,.xlsx,.xls">
      <textarea id="input" placeholder="Type here&hellip;"></textarea>
      <button class="btn" id="send">Send</button>
    </div>
  </div>
</main>

<!-- Drop overlay -->
<div class="drop-overlay" id="dropOverlay">
  <div class="drop-overlay-box">
    <svg class="drop-overlay-icon" width="48" height="48" viewBox="0 0 24 24" fill="none">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="drop-overlay-title">Drop file here</div>
    <div class="drop-overlay-sub">.docx, .xlsx, .csv, .txt</div>
  </div>
</div>

<!-- Save template modal -->
<div class="modal-overlay" id="saveTemplateModal">
  <div class="modal-box">
    <h3>Save as New Template</h3>
    <div class="bf-field">
      <label>Template Name</label>
      <input type="text" id="newTemplateName" placeholder="e.g. Summer Blast 2026">
    </div>
    <div class="bf-actions">
      <button class="btn" id="saveTemplateConfirm">Save</button>
      <button class="btn ghost" id="saveTemplateCancel">Cancel</button>
    </div>
  </div>
</div>

<script src="/app.js?v=4"></script>
<script>
var session = null;
var currentPath = null;
var joFormActive = false;
var blastFormActive = false;
var blastFormData = null;
var PATH_LABELS = { job_order: 'New Job Order', blast: 'Send Magic Blast', review: 'Review Magic Blasts', help: 'Help / FAQ' };

var CATEGORIES = ['Industrial', 'Administrative', 'Skilled Trade'];
var STATUSES = ['Published', 'Unpublished'];

var FIELD_VISIBILITY = {
  title: '(visible to candidates)',
  category: '(visible)',
  pay: '(visible)',
  shift_hours: '(visible)',
  city_state: '(visible \u2014 city/state only, NOT full address)',
  requirements: '(visible)',
  description: '(visible)',
  company: '(HIDDEN from candidates)',
  address: '(HIDDEN from candidates)',
  status: '(internal)',
};

var JO_FIELDS = [
  { key: 'title', label: 'Title', required: true },
  { key: 'category', label: 'Category', required: true },
  { key: 'pay', label: 'Pay', required: true },
  { key: 'shift_hours', label: 'Shift / Hours', required: false },
  { key: 'company', label: 'Company', required: false },
  { key: 'address', label: 'Address', required: false },
  { key: 'city_state', label: 'City / State', required: false },
  { key: 'requirements', label: 'Requirements', required: false },
  { key: 'description', label: 'Description', required: false },
  { key: 'status', label: 'Status', required: true },
];

function showLoading() {
  var chat = document.getElementById('chat');
  var el = document.createElement('div');
  el.className = 'msg tom loading-indicator';
  el.id = 'loading-msg';
  el.innerHTML = '<span class="dots"><span></span><span></span><span></span></span> Working...';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}
function hideLoading() {
  var el = document.getElementById('loading-msg');
  if (el) el.remove();
}

function md(s) {
  if (!s) return '';
  return s
    .replace(/^### (.+)/gm, '<h4>$1</h4>')
    .replace(/^## (.+)/gm, '<h3>$1</h3>')
    .replace(/^# (.+)/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^- (.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n/g, '<br>');
}

// ---- Full-width JO Form ----
function showJOForm(draft, warnings) {
  joFormActive = true;
  var panel = document.getElementById('jo-form-panel');
  panel.className = 'active';
  panel.innerHTML = '';
  document.getElementById('chat').style.display = 'none';
  document.getElementById('blast-form-panel').className = '';

  var title = document.createElement('div');
  title.className = 'form-title';
  title.textContent = draft.title ? 'Edit Job Order' : 'New Job Order';
  panel.appendChild(title);

  if (warnings && warnings.length) {
    var warn = document.createElement('div');
    warn.className = 'form-warn';
    warn.textContent = 'Notes: ' + warnings.join('; ');
    panel.appendChild(warn);
  }

  var form = document.createElement('div');
  form.className = 'jo-form';
  form.id = 'jo-edit-form';

  JO_FIELDS.forEach(function(f) {
    var wrap = document.createElement('div');
    wrap.className = 'jo-field';
    var label = document.createElement('label');
    var vis = FIELD_VISIBILITY[f.key] || '';
    label.innerHTML = esc(f.label) + (f.required ? ' *' : '') + (vis ? ' <span class="vis">' + esc(vis) + '</span>' : '');
    wrap.appendChild(label);

    var input;
    if (f.key === 'category') {
      input = document.createElement('select');
      var emptyOpt = document.createElement('option');
      emptyOpt.value = ''; emptyOpt.textContent = '\u2014 Select \u2014';
      input.appendChild(emptyOpt);
      CATEGORIES.forEach(function(c) {
        var opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        if (draft[f.key] === c) opt.selected = true;
        input.appendChild(opt);
      });
    } else if (f.key === 'status') {
      input = document.createElement('select');
      STATUSES.forEach(function(s) {
        var opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        if (draft[f.key] === s) opt.selected = true;
        input.appendChild(opt);
      });
    } else if (f.key === 'description' || f.key === 'requirements') {
      input = document.createElement('textarea');
      input.value = draft[f.key] || '';
    } else {
      input = document.createElement('input');
      input.type = 'text';
      input.value = draft[f.key] || '';
    }
    input.dataset.field = f.key;
    wrap.appendChild(input);
    form.appendChild(wrap);
  });

  panel.appendChild(form);

  var actions = document.createElement('div');
  actions.className = 'form-actions';

  var pubBtn = document.createElement('button');
  pubBtn.className = 'btn gold';
  pubBtn.textContent = 'Publish';
  pubBtn.addEventListener('click', function() { submitJOForm('publish'); });

  var draftBtn = document.createElement('button');
  draftBtn.className = 'btn ghost';
  draftBtn.style.background = '#334155';
  draftBtn.style.color = '#94a3b8';
  draftBtn.textContent = 'Save as Draft';
  draftBtn.addEventListener('click', function() { submitJOForm('done'); });

  var startOverBtn = document.createElement('button');
  startOverBtn.className = 'btn ghost';
  startOverBtn.textContent = 'Start Over';
  startOverBtn.addEventListener('click', function() { hideJOForm(); sendAction('start_over', {}); });

  actions.appendChild(pubBtn);
  actions.appendChild(draftBtn);
  actions.appendChild(startOverBtn);
  panel.appendChild(actions);

  document.getElementById('input').placeholder = 'Edit fields directly in the form above, or click Start Over to re-parse.';
}

function hideJOForm() {
  joFormActive = false;
  var panel = document.getElementById('jo-form-panel');
  panel.className = '';
  panel.innerHTML = '';
  document.getElementById('chat').style.display = 'flex';
  document.getElementById('input').placeholder = 'Type here\u2026';
}

function getFormDraft() {
  var draft = {};
  var form = document.getElementById('jo-edit-form');
  if (!form) return draft;
  form.querySelectorAll('input, textarea, select').forEach(function(el) {
    if (el.dataset.field) draft[el.dataset.field] = el.value;
  });
  return draft;
}

async function submitJOForm(action) {
  var draft = getFormDraft();
  showLoading();
  var r = await api('/api/tom/message', { method: 'POST', body: { sessionId: session, action: action, payload: { draft: draft } } });
  hideLoading();
  if (r.showForm && r.draft) {
    showJOForm(r.draft, r.warnings || []);
    return;
  }
  if (r.error && r.state === 'review') {
    var panel = document.getElementById('jo-form-panel');
    var existing = panel.querySelector('.form-warn');
    if (existing) existing.remove();
    var warn = document.createElement('div');
    warn.className = 'form-warn';
    warn.textContent = r.text || r.error;
    var actionsEl = panel.querySelector('.form-actions');
    if (actionsEl) panel.insertBefore(warn, actionsEl);
    return;
  }
  hideJOForm();
  handleReply(r);
}

// ---- Full-width Blast Settings Form ----
function showBlastForm(data) {
  blastFormActive = true;
  blastFormData = data;
  var panel = document.getElementById('blast-form-panel');
  panel.className = 'active';
  panel.innerHTML = '';
  document.getElementById('chat').style.display = 'none';
  document.getElementById('jo-form-panel').className = '';
  document.getElementById('composer').style.display = 'none';

  var title = document.createElement('div');
  title.className = 'bf-title';
  title.textContent = 'Blast Settings';
  panel.appendChild(title);

  // Stats line
  var stat = document.createElement('div');
  stat.className = 'bf-stat';
  var statParts = ['<strong>' + data.contactCount + ' contacts parsed</strong>'];
  if (data.invalidCount) statParts.push('(' + data.invalidCount + ' bad phone numbers excluded)');
  if (data.importCounts) {
    var ic = data.importCounts;
    statParts.push('\u2014 ' + (ic.created || 0) + ' new, ' + (ic.updated || 0) + ' updated, ' + (ic.unchanged || 0) + ' unchanged');
  }
  stat.innerHTML = statParts.join(' ');
  panel.appendChild(stat);

  var form = document.createElement('div');
  form.className = 'bf-form';
  form.id = 'blast-settings-form';

  // --- Recipients ---
  var recipField = document.createElement('div');
  recipField.className = 'bf-field';
  var recipLabel = document.createElement('label');
  recipLabel.textContent = 'Recipients';
  recipField.appendChild(recipLabel);
  var recipGroup = document.createElement('div');
  recipGroup.className = 'bf-radio-group';
  recipGroup.innerHTML =
    '<label><input type="radio" name="recipientMode" value="all" checked> All</label>' +
    '<label><input type="radio" name="recipientMode" value="top"> Top</label>' +
    '<input type="number" id="recipientCount" value="300" min="1" max="' + data.contactCount + '" style="display:none">';
  recipField.appendChild(recipGroup);
  form.appendChild(recipField);

  // Toggle number input visibility
  setTimeout(function() {
    var radios = recipGroup.querySelectorAll('input[name="recipientMode"]');
    var numInput = document.getElementById('recipientCount');
    radios.forEach(function(r) {
      r.addEventListener('change', function() {
        numInput.style.display = r.value === 'top' && r.checked ? 'inline-block' : 'none';
      });
    });
  }, 0);

  // --- Sort By ---
  if (data.hasLastContacted) {
    var sortField = document.createElement('div');
    sortField.className = 'bf-field';
    var sortLabel = document.createElement('label');
    sortLabel.textContent = 'Sort by';
    sortField.appendChild(sortLabel);
    var sortSel = document.createElement('select');
    sortSel.id = 'blastSortBy';
    (data.sortOptions || []).forEach(function(o) {
      var opt = document.createElement('option');
      opt.value = o.value; opt.textContent = o.label;
      sortSel.appendChild(opt);
    });
    sortField.appendChild(sortSel);
    form.appendChild(sortField);
  }

  // --- Category ---
  var catField = document.createElement('div');
  catField.className = 'bf-field';
  var catLabel = document.createElement('label');
  catLabel.textContent = 'Category *';
  catField.appendChild(catLabel);
  var catGroup = document.createElement('div');
  catGroup.className = 'bf-btn-group';
  catGroup.id = 'blastCategoryGroup';
  (data.categories || []).forEach(function(c) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = c;
    btn.dataset.cat = c;
    btn.addEventListener('click', function() {
      catGroup.querySelectorAll('button').forEach(function(b) { b.classList.remove('selected'); });
      btn.classList.add('selected');
    });
    catGroup.appendChild(btn);
  });
  catField.appendChild(catGroup);
  form.appendChild(catField);

  // --- Template ---
  var tplField = document.createElement('div');
  tplField.className = 'bf-field';
  var tplLabel = document.createElement('label');
  tplLabel.textContent = 'Template';
  tplField.appendChild(tplLabel);
  var tplSel = document.createElement('select');
  tplSel.id = 'blastTemplateSelect';
  (data.templates || []).forEach(function(t) {
    var opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.name + (t.category ? ' (' + t.category + ')' : '') + (t.is_default ? ' \u2605' : '');
    opt.dataset.body = t.body;
    if (data.defaultTemplateId && t.id === data.defaultTemplateId) opt.selected = true;
    tplSel.appendChild(opt);
  });
  tplField.appendChild(tplSel);
  form.appendChild(tplField);

  // --- Template body (editable) ---
  var bodyField = document.createElement('div');
  bodyField.className = 'bf-field';
  var bodyLabel = document.createElement('label');
  bodyLabel.textContent = 'Message (editable)';
  bodyField.appendChild(bodyLabel);
  var bodyArea = document.createElement('textarea');
  bodyArea.id = 'blastTemplateBody';
  var defaultTpl = (data.templates || []).find(function(t) { return data.defaultTemplateId && t.id === data.defaultTemplateId; }) || (data.templates || [])[0];
  bodyArea.value = defaultTpl ? defaultTpl.body : '';
  bodyField.appendChild(bodyArea);

  // Preview box
  var previewBox = document.createElement('div');
  previewBox.className = 'bf-preview-box';
  previewBox.id = 'blastTemplatePreview';
  previewBox.textContent = bodyArea.value
    .replace(/\{first_name\}/g, 'John')
    .replace(/\{link\}/g, 'https://app.joblinkplatform.com/m/abc123');
  bodyField.appendChild(previewBox);

  // Save as new template link
  var saveLink = document.createElement('a');
  saveLink.className = 'bf-save-link';
  saveLink.textContent = 'Save as new template';
  saveLink.addEventListener('click', function(e) {
    e.preventDefault();
    document.getElementById('saveTemplateModal').classList.add('active');
  });
  bodyField.appendChild(saveLink);

  form.appendChild(bodyField);

  // Sync template select <-> body
  tplSel.addEventListener('change', function() {
    var selOpt = tplSel.options[tplSel.selectedIndex];
    if (selOpt && selOpt.dataset.body) {
      bodyArea.value = selOpt.dataset.body;
      updateTemplatePreview();
    }
  });
  bodyArea.addEventListener('input', function() { updateTemplatePreview(); });

  // --- Recruiter ---
  var recField = document.createElement('div');
  recField.className = 'bf-field';
  var recLabel = document.createElement('label');
  recLabel.textContent = 'Recruiter';
  recField.appendChild(recLabel);
  var recSel = document.createElement('select');
  recSel.id = 'blastRecruiter';
  var noneOpt = document.createElement('option');
  noneOpt.value = ''; noneOpt.textContent = '\u2014 None \u2014';
  recSel.appendChild(noneOpt);
  // Prefer Whippy users, fall back to local
  var users = (data.whippyUsers && data.whippyUsers.length) ? data.whippyUsers : (data.localUsers || []);
  users.forEach(function(u) {
    var opt = document.createElement('option');
    opt.value = u.id;
    opt.textContent = u.name || u.username || u.email || 'User ' + u.id;
    recSel.appendChild(opt);
  });
  recField.appendChild(recSel);
  form.appendChild(recField);

  panel.appendChild(form);

  // --- Action buttons ---
  var actions = document.createElement('div');
  actions.className = 'bf-actions';

  var previewBtn = document.createElement('button');
  previewBtn.className = 'btn';
  previewBtn.textContent = 'Preview Blast';
  previewBtn.addEventListener('click', function() { submitBlastForm(); });

  var startOverBtn = document.createElement('button');
  startOverBtn.className = 'btn ghost';
  startOverBtn.textContent = 'Start Over';
  startOverBtn.addEventListener('click', function() { hideBlastForm(); sendAction('start_over', {}); });

  actions.appendChild(previewBtn);
  actions.appendChild(startOverBtn);
  panel.appendChild(actions);
}

function updateTemplatePreview() {
  var body = document.getElementById('blastTemplateBody');
  var preview = document.getElementById('blastTemplatePreview');
  if (!body || !preview) return;
  preview.textContent = body.value
    .replace(/\{first_name\}/g, 'John')
    .replace(/\{link\}/g, 'https://app.joblinkplatform.com/m/abc123');
}

function hideBlastForm() {
  blastFormActive = false;
  blastFormData = null;
  var panel = document.getElementById('blast-form-panel');
  panel.className = '';
  panel.innerHTML = '';
  document.getElementById('chat').style.display = 'flex';
  document.getElementById('composer').style.display = 'flex';
  document.getElementById('input').placeholder = 'Type here\u2026';
}

function getBlastFormValues() {
  var modeRadio = document.querySelector('input[name="recipientMode"]:checked');
  var recipientMode = modeRadio ? modeRadio.value : 'all';
  var recipientCount = document.getElementById('recipientCount') ? document.getElementById('recipientCount').value : '300';
  var sortEl = document.getElementById('blastSortBy');
  var sortBy = sortEl ? sortEl.value : 'most_recent';
  var catBtn = document.querySelector('#blastCategoryGroup button.selected');
  var category = catBtn ? catBtn.dataset.cat : null;
  var tplSel = document.getElementById('blastTemplateSelect');
  var templateId = tplSel ? tplSel.value : null;
  var bodyEl = document.getElementById('blastTemplateBody');
  var templateBody = bodyEl ? bodyEl.value : '';
  var recSel = document.getElementById('blastRecruiter');
  var recruiterId = recSel ? recSel.value : '';

  return {
    recipientMode: recipientMode,
    recipientCount: recipientCount,
    sortBy: sortBy,
    category: category,
    templateId: templateId,
    templateBody: templateBody,
    recruiterId: recruiterId || null,
  };
}

async function submitBlastForm() {
  var vals = getBlastFormValues();
  if (!vals.category) {
    toast('Select a category before previewing.');
    return;
  }
  if (!vals.templateBody.trim()) {
    toast('Template message cannot be empty.');
    return;
  }
  hideBlastForm();
  showLoading();
  var r = await api('/api/tom/message', { method: 'POST', body: { sessionId: session, action: 'preview_blast', payload: vals } });
  hideLoading();
  if (r.showBlastForm && r.keepForm) {
    showBlastForm(blastFormData || r);
    if (r.text) toast(r.text);
    return;
  }
  handleReply(r);
}

// ---- Save Template Modal ----
document.getElementById('saveTemplateConfirm').addEventListener('click', async function() {
  var nameEl = document.getElementById('newTemplateName');
  var name = nameEl.value.trim();
  if (!name) { toast('Enter a template name.'); return; }
  var bodyEl = document.getElementById('blastTemplateBody');
  var body = bodyEl ? bodyEl.value : '';
  var catBtn = document.querySelector('#blastCategoryGroup button.selected');
  var category = catBtn ? catBtn.dataset.cat : null;
  document.getElementById('saveTemplateModal').classList.remove('active');
  nameEl.value = '';
  showLoading();
  var r = await api('/api/tom/message', { method: 'POST', body: { sessionId: session, action: 'save_template', payload: { name: name, body: body, category: category } } });
  hideLoading();
  if (r.templates && r.savedTemplate) {
    var tplSel = document.getElementById('blastTemplateSelect');
    if (tplSel) {
      tplSel.innerHTML = '';
      r.templates.forEach(function(t) {
        var opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.name + (t.category ? ' (' + t.category + ')' : '') + (t.is_default ? ' \u2605' : '');
        opt.dataset.body = t.body;
        if (t.id === r.savedTemplate.id) opt.selected = true;
        tplSel.appendChild(opt);
      });
    }
    toast('Template "' + r.savedTemplate.name + '" saved.');
  }
});
document.getElementById('saveTemplateCancel').addEventListener('click', function() {
  document.getElementById('saveTemplateModal').classList.remove('active');
  document.getElementById('newTemplateName').value = '';
});

// ---- Blast Review Cards ----
function renderBlastCards(blasts) {
  var container = document.createElement('div');
  (blasts || []).forEach(function(b) {
    var card = document.createElement('div');
    card.className = 'blast-card';
    var d = new Date(b.sent_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    var bits = [b.sent_count + ' sent'];
    if (b.skipped_cooldown_count) bits.push(b.skipped_cooldown_count + ' skipped (cooldown)');
    if (b.skipped_dnc_count) bits.push(b.skipped_dnc_count + ' skipped (DNC)');
    if (b.failed_count) bits.push(b.failed_count + ' failed');
    bits.push(b.interested_count + ' interested');
    var header = document.createElement('div');
    header.className = 'bc-header';
    header.textContent = '#' + b.id + ' \u00B7 ' + d + ' \u00B7 ' + (b.category || '') + (b.sent_by ? ' \u00B7 by ' + b.sent_by : '');
    card.appendChild(header);
    var meta = document.createElement('div');
    meta.className = 'bc-meta';
    meta.textContent = bits.join(', ');
    card.appendChild(meta);
    card.addEventListener('click', async function() {
      var existing = card.querySelector('.blast-recipients');
      if (existing) { existing.remove(); return; }
      var data = await api('/api/blasts/' + b.id + '/recipients');
      if (!data || !data.recipients) return;
      var sec = document.createElement('div');
      sec.className = 'blast-recipients';
      var tbl = document.createElement('table');
      tbl.innerHTML = '<tr><th>Name</th><th>Phone</th><th>Status</th></tr>';
      data.recipients.forEach(function(r) {
        var row = document.createElement('tr');
        var td1 = document.createElement('td'); td1.textContent = (r.first_name || '') + ' ' + (r.last_name || '');
        var td2 = document.createElement('td'); td2.textContent = r.phone_display || r.phone;
        var td3 = document.createElement('td'); td3.textContent = r.status;
        row.appendChild(td1); row.appendChild(td2); row.appendChild(td3);
        tbl.appendChild(row);
      });
      sec.appendChild(tbl);
      var csvLink = document.createElement('a');
      csvLink.className = 'csv-link';
      csvLink.href = '/api/blasts/' + b.id + '/recipients/csv';
      csvLink.download = '';
      csvLink.textContent = 'Download CSV';
      sec.appendChild(csvLink);
      card.appendChild(sec);
    });
    container.appendChild(card);
  });
  return container;
}

function esc(s) { var d = document.createElement('span'); d.textContent = s; return d.innerHTML; }

function renderRecipientToggle(plan) {
  if (!plan || !plan.sendable || !plan.sendable.length) return null;
  var wrap = document.createElement('div');
  var btn = document.createElement('button');
  btn.className = 'recipient-toggle';
  btn.textContent = 'Show all ' + plan.sendable.length + ' recipients';
  var expanded = false;
  var list = document.createElement('div');
  list.className = 'recipient-list';
  list.style.display = 'none';
  plan.sendable.forEach(function(c) {
    var row = document.createElement('div');
    row.className = 'rl-row';
    row.textContent = (c.first_name || '') + ' ' + (c.last_name || '') + ' \u2014 ' + (c.phone || '');
    list.appendChild(row);
  });
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    expanded = !expanded;
    list.style.display = expanded ? 'block' : 'none';
    btn.textContent = expanded ? 'Hide recipients' : 'Show all ' + plan.sendable.length + ' recipients';
  });
  wrap.appendChild(btn);
  wrap.appendChild(list);
  return wrap;
}

function addMsg(who, text, extra) {
  var chat = document.getElementById('chat');
  var hint = chat.querySelector('.hint');
  if (hint) hint.remove();
  var div = document.createElement('div');
  div.className = 'msg ' + who;

  var richRendered = false;

  if (extra) {
    if (extra.blasts && extra.blasts.length) {
      richRendered = true;
      var textPre2 = document.createElement('div');
      textPre2.style.whiteSpace = 'pre-wrap';
      textPre2.textContent = text;
      div.appendChild(textPre2);
      div.appendChild(renderBlastCards(extra.blasts));
    }
  }

  if (!richRendered) {
    div.innerHTML = md(text);
  }

  if (extra) {
    var choices = document.createElement('div');
    choices.className = 'choices';
    if (extra.choices) {
      extra.choices.forEach(function(c) {
        var b = document.createElement('button');
        b.className = 'btn sm';
        b.textContent = c;
        b.onclick = function() { sendAction(extra.choiceAction, { category: c }, c); };
        choices.appendChild(b);
      });
    }
    if (extra.confirmButton) {
      var b = document.createElement('button');
      b.className = 'btn gold';
      b.textContent = '\uD83D\uDE80 ' + extra.confirmButton.label;
      b.onclick = function() {
        b.disabled = true;
        sendAction(extra.confirmButton.action, {});
      };
      choices.appendChild(b);
    }
    if (choices.children.length) div.appendChild(choices);

    // Expandable recipient list in blast preview
    if (extra.confirmButton && extra.plan) {
      var toggle = renderRecipientToggle(extra.plan);
      if (toggle) div.appendChild(toggle);
    }

    // "Start with blank form" link for JO path
    if (extra.showBlankFormLink) {
      var link = document.createElement('a');
      link.className = 'blank-form-link';
      link.textContent = 'Or start with a blank form';
      link.addEventListener('click', function(e) {
        e.preventDefault();
        sendAction('blank_form', {});
      });
      div.appendChild(link);
    }
  }
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function handleReply(r) {
  if (r.error) { addMsg('tom', r.text || r.error); return; }
  session = r.sessionId;

  // JO form
  if (r.showForm && r.draft) {
    showJOForm(r.draft, r.warnings || []);
    return;
  }

  // Blast settings form
  if (r.showBlastForm && !r.keepForm) {
    showBlastForm(r);
    return;
  }

  // If we were on blast form and got a non-form reply, hide it
  if (blastFormActive && !r.showBlastForm) {
    hideBlastForm();
    document.getElementById('composer').style.display = 'flex';
  }

  addMsg('tom', r.text, r);
}

async function startPath(path) {
  currentPath = path;
  hideJOForm();
  if (blastFormActive) hideBlastForm();
  document.querySelectorAll('.paths button').forEach(function(b) {
    b.classList.toggle('on', b.dataset.path === path);
  });
  document.getElementById('chat').innerHTML = '';
  document.getElementById('composer').style.display = path === 'review' ? 'none' : 'flex';
  document.getElementById('input').placeholder = 'Type here\u2026';
  showLoading();
  var r = await api('/api/tom/start', { method: 'POST', body: { path: path } });
  hideLoading();
  handleReply(r);
}

function tryStartPath(path) {
  if (session) {
    if (!confirm('Starting a new task will end the current one. Continue?')) return;
  }
  session = null;
  startPath(path);
}

async function sendText() {
  var inputEl = document.getElementById('input');
  var text = inputEl.value.trim();
  if (!session) return;

  if (joFormActive) {
    inputEl.value = '';
    if (text) toast('Edit fields directly in the form above, or click Start Over to re-parse.');
    return;
  }

  if (blastFormActive) {
    inputEl.value = '';
    if (text) toast('Use the blast settings form above, then click Preview Blast.');
    return;
  }

  var goldBtn = document.querySelector('.choices .btn.gold:not([disabled])');
  if (goldBtn) { inputEl.value = ''; goldBtn.click(); return; }
  if (!text) return;
  inputEl.value = '';
  addMsg('me', text);
  showLoading();
  var r = await api('/api/tom/message', { method: 'POST', body: { sessionId: session, text: text } });
  hideLoading();
  handleReply(r);
}

async function sendAction(action, payload, label) {
  if (label) addMsg('me', label);
  showLoading();
  var r = await api('/api/tom/message', { method: 'POST', body: { sessionId: session, action: action, payload: payload } });
  hideLoading();
  handleReply(r);
}

async function uploadFile(file) {
  if (!file || !session) return;
  addMsg('me', '\uD83D\uDCCE ' + file.name);
  showLoading();
  var fd = new FormData();
  fd.append('sessionId', session);
  fd.append('file', file);
  var res = await fetch('/api/tom/upload', { method: 'POST', body: fd });
  hideLoading();
  handleReply(await res.json());
}

// ---- Drag and Drop ----
(function() {
  var dropOverlay = document.getElementById('dropOverlay');
  var dragCounter = 0;
  var mainEl = document.querySelector('main.page');

  mainEl.addEventListener('dragenter', function(e) { e.preventDefault(); dragCounter++; dropOverlay.classList.add('active'); });
  mainEl.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); });
  mainEl.addEventListener('dragleave', function(e) { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active'); } });
  dropOverlay.addEventListener('dragleave', function(e) { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active'); } });

  function handleDrop(e) {
    e.preventDefault(); e.stopPropagation();
    dropOverlay.classList.remove('active'); dragCounter = 0;
    var files = Array.from(e.dataTransfer.files || []);
    if (!files.length) return;
    var file = files[0];
    if (file.size > 5 * 1024 * 1024) { toast(file.name + ' is too large (max 5 MB).'); return; }
    if (!/\.(csv|tsv|txt|xlsx|xls|docx|doc)$/i.test(file.name)) { toast(file.name + ': unsupported format. Use .docx, .xlsx, .csv, or .txt'); return; }

    if (session) {
      uploadFile(file);
      return;
    }
    toast('Pick a task above first, then drop your file.');
  }

  dropOverlay.addEventListener('drop', handleDrop);
  mainEl.addEventListener('drop', handleDrop);
})();

// Wire up buttons
document.querySelectorAll('.paths button').forEach(function(b) { b.addEventListener('click', function() { tryStartPath(b.dataset.path); }); });
document.getElementById('send').addEventListener('click', sendText);
document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});
document.getElementById('attach').addEventListener('click', function() { document.getElementById('fileinput').click(); });
document.getElementById('fileinput').addEventListener('change', async function(e) {
  var file = e.target.files[0];
  if (!file) return;
  uploadFile(file);
  e.target.value = '';
});

boot('tom').then(function() {
  var p = new URLSearchParams(location.search).get('path');
  if (p && ['job_order','blast','review','help'].includes(p)) startPath(p);
});
</script>
