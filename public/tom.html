<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JobLink — AI Assistant</title>
<link rel="stylesheet" href="/app.css">
<style>
  .paths { justify-content: center; display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-bottom:16px; }
  .paths button { padding:16px 12px; border:2px solid var(--line); background:#161b22; border-radius:12px; cursor:pointer;
    font-size:.95rem; font-weight:600; color:var(--ink); transition:border-color .15s, background .15s; }
  .paths button:hover { border-color:var(--blue); }
  .paths button.on { border-color:var(--blue); background:rgba(96,165,250,0.15); }
  #chat { display:flex; flex-direction:column; gap:10px; min-height:300px; }
  .msg { max-width:78%; padding:12px 15px; border-radius:14px; white-space:pre-wrap; font-size:.94rem; line-height:1.45; }
  .msg.tom { background:#161b22; border:1px solid var(--line); align-self:flex-start; border-bottom-left-radius:4px; }
  .msg.me { background:var(--blue); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
  .msg .choices { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  #composer { display:flex; gap:8px; margin-top:14px; }
  #composer textarea { flex:1; resize:vertical; min-height:46px; max-height:160px; }
  .hint { text-align:center; margin:40px 0; color:var(--mut); }

  /* Editable JO form */
  .jo-form { margin-top:10px; display:flex; flex-direction:column; gap:8px; }
  .jo-form .jo-field { display:flex; flex-direction:column; gap:2px; }
  .jo-form label { font-size:.8rem; color:var(--mut); font-weight:600; }
  .jo-form label .vis { font-weight:400; font-style:italic; font-size:.75rem; }
  .jo-form input, .jo-form textarea { background:#0d1117; border:1px solid var(--line); color:var(--ink);
    padding:6px 8px; border-radius:6px; font-size:.9rem; font-family:inherit; }
  .jo-form textarea { min-height:60px; resize:vertical; }
  .jo-form input:focus, .jo-form textarea:focus { border-color:var(--blue); outline:none; }

  /* Blast review cards */
  .blast-card { background:#0d1117; border:1px solid var(--line); border-radius:8px; padding:10px 12px;
    margin-top:6px; cursor:pointer; transition:border-color .15s; }
  .blast-card:hover { border-color:var(--blue); }
  .blast-card .bc-header { font-weight:600; font-size:.9rem; }
  .blast-card .bc-meta { font-size:.8rem; color:var(--mut); margin-top:2px; }
  .blast-recipients { margin-top:8px; font-size:.85rem; }
  .blast-recipients table { width:100%; border-collapse:collapse; margin-top:4px; }
  .blast-recipients th, .blast-recipients td { text-align:left; padding:3px 6px; border-bottom:1px solid var(--line); font-size:.82rem; }
  .blast-recipients th { color:var(--mut); font-weight:600; }
  .blast-recipients .csv-link { display:inline-block; margin-top:6px; color:var(--blue); text-decoration:underline; cursor:pointer; font-size:.82rem; }

  /* Expandable recipient list */
  .recipient-toggle { background:none; border:1px solid var(--line); color:var(--blue); padding:6px 10px;
    border-radius:6px; cursor:pointer; font-size:.82rem; margin-top:8px; }
  .recipient-toggle:hover { border-color:var(--blue); }
  .recipient-list { margin-top:6px; font-size:.82rem; max-height:300px; overflow-y:auto; }
  .recipient-list .rl-row { padding:2px 0; border-bottom:1px solid rgba(255,255,255,0.05); }

  .loading-indicator { display:flex; align-items:center; gap:8px; padding:12px 16px; color:#94a3b8; font-size:.9rem; }
  .loading-indicator .dots { display:inline-flex; gap:4px; }
  .loading-indicator .dots span { width:8px; height:8px; border-radius:50%; background:#60a5fa; animation:bounce 1.4s infinite ease-in-out both; }
  .loading-indicator .dots span:nth-child(1) { animation-delay:-0.32s; }
  .loading-indicator .dots span:nth-child(2) { animation-delay:-0.16s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
</style></head>
<body>
<main class="page">
  <h1 class="pagetitle">AI Assistant</h1>
  <div class="paths" id="paths">
    <button data-path="job_order">&#x1F4CB; New Job Order</button>
    <button data-path="blast">&#x2728; Send Magic Blast</button>
    <button data-path="review">&#x1F4CA; Review Magic Blasts</button>
    <button data-path="help">&#x2753; Help / Tutorial / FAQ</button>
  </div>
  <div class="card">
    <div id="chat"><div class="hint">Pick a button above to start. One task per conversation &mdash; switching tasks starts a fresh one.</div></div>
    <div id="composer" style="display:none">
      <button class="btn ghost" id="attach" title="Upload a file">&#x1F4CE;</button>
      <input type="file" id="fileinput" style="display:none">
      <textarea id="input" placeholder="Type here&hellip;"></textarea>
      <button class="btn" id="send">Send</button>
    </div>
  </div>
</main>
<script src="/app.js?v=2"></script>
<script>
let session = null;
const PATH_LABELS = { job_order: 'New Job Order', blast: 'Send Magic Blast', review: 'Review Magic Blasts', help: 'Help / FAQ' };

// Visibility annotations for JO fields
const FIELD_VISIBILITY = {
  title: '(visible to candidates)',
  category: '(visible)',
  pay: '(visible)',
  shift_hours: '(visible)',
  location: '(visible \u2014 city/state only, NOT full address)',
  requirements: '(visible)',
  description: '(visible)',
  company: '(HIDDEN from candidates)',
  status: '(internal)',
};



function showLoading() {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'msg tom loading-indicator';
  el.id = 'loading-msg';
  el.innerHTML = '<span class="dots"><span></span><span></span><span></span></span> Working...';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}
function hideLoading() {
  const el = document.getElementById('loading-msg');
  if (el) el.remove();
}

function md(s) {
  if (!s) return '';
  return s
    .replace(/^### (.+)/gm, '<h4>$1</h4>')
    .replace(/^## (.+)/gm, '<h3>$1</h3>')
    .replace(/^# (.+)/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^- (.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n/g, '<br>');
}

function renderJOForm(draft, fields) {
  const form = document.createElement('div');
  form.className = 'jo-form';
  (fields || []).forEach(function(f) {
    const wrap = document.createElement('div');
    wrap.className = 'jo-field';
    const label = document.createElement('label');
    const vis = FIELD_VISIBILITY[f.key] || '';
    label.innerHTML = esc(f.label) + (vis ? ' <span class="vis">' + esc(vis) + '</span>' : '');
    wrap.appendChild(label);
    const isLong = f.key === 'description' || f.key === 'requirements';
    const input = document.createElement(isLong ? 'textarea' : 'input');
    input.value = draft[f.key] || '';
    if (f.key === 'status') input.disabled = true;
    input.addEventListener('change', function() {
      sendAction('edit_field', { field: f.key, value: input.value });
    });
    wrap.appendChild(input);
    form.appendChild(wrap);
  });
  return form;
}

function renderBlastCards(blasts) {
  const container = document.createElement('div');
  (blasts || []).forEach(function(b) {
    const card = document.createElement('div');
    card.className = 'blast-card';
    const d = new Date(b.sent_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const bits = [b.sent_count + ' sent'];
    if (b.skipped_cooldown_count) bits.push(b.skipped_cooldown_count + ' skipped (cooldown)');
    if (b.skipped_dnc_count) bits.push(b.skipped_dnc_count + ' skipped (DNC)');
    if (b.failed_count) bits.push(b.failed_count + ' failed');
    bits.push(b.interested_count + ' interested');
    const header = document.createElement('div');
    header.className = 'bc-header';
    header.textContent = '#' + b.id + ' \u00B7 ' + d + ' \u00B7 ' + (b.category || '') + (b.sent_by ? ' \u00B7 by ' + b.sent_by : '');
    card.appendChild(header);
    const meta = document.createElement('div');
    meta.className = 'bc-meta';
    meta.textContent = bits.join(', ');
    card.appendChild(meta);
    card.addEventListener('click', async function() {
      var existing = card.querySelector('.blast-recipients');
      if (existing) { existing.remove(); return; }
      var data = await api('/api/blasts/' + b.id + '/recipients');
      if (!data || !data.recipients) return;
      var sec = document.createElement('div');
      sec.className = 'blast-recipients';
      var tbl = document.createElement('table');
      tbl.innerHTML = '<tr><th>Name</th><th>Phone</th><th>Status</th></tr>';
      data.recipients.forEach(function(r) {
        var row = document.createElement('tr');
        var td1 = document.createElement('td');
        td1.textContent = (r.first_name || '') + ' ' + (r.last_name || '');
        var td2 = document.createElement('td');
        td2.textContent = r.phone_display || r.phone;
        var td3 = document.createElement('td');
        td3.textContent = r.status;
        row.appendChild(td1); row.appendChild(td2); row.appendChild(td3);
        tbl.appendChild(row);
      });
      sec.appendChild(tbl);
      var csvLink = document.createElement('a');
      csvLink.className = 'csv-link';
      csvLink.href = '/api/blasts/' + b.id + '/recipients/csv';
      csvLink.download = '';
      csvLink.textContent = 'Download CSV';
      sec.appendChild(csvLink);
      card.appendChild(sec);
    });
    container.appendChild(card);
  });
  return container;
}

function esc(s) {
  var d = document.createElement('span');
  d.textContent = s;
  return d.innerHTML;
}

function renderRecipientToggle(plan) {
  if (!plan || !plan.sendable || !plan.sendable.length) return null;
  var wrap = document.createElement('div');
  var btn = document.createElement('button');
  btn.className = 'recipient-toggle';
  btn.textContent = 'Show all ' + plan.sendable.length + ' recipients';
  var expanded = false;
  var list = document.createElement('div');
  list.className = 'recipient-list';
  list.style.display = 'none';
  plan.sendable.forEach(function(c) {
    var row = document.createElement('div');
    row.className = 'rl-row';
    row.textContent = (c.first_name || '') + ' ' + (c.last_name || '') + ' \u2014 ' + (c.phone || '');
    list.appendChild(row);
  });
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    expanded = !expanded;
    list.style.display = expanded ? 'block' : 'none';
    btn.textContent = expanded ? 'Hide recipients' : 'Show all ' + plan.sendable.length + ' recipients';
  });
  wrap.appendChild(btn);
  wrap.appendChild(list);
  return wrap;
}

function addMsg(who, text, extra) {
  var chat = document.getElementById('chat');
  var hint = chat.querySelector('.hint');
  if (hint) hint.remove();
  var div = document.createElement('div');
  div.className = 'msg ' + who;

  // Check if we need rich rendering
  var richRendered = false;

  if (extra) {
    // Editable JO form with visibility labels
    if (extra.draft && extra.fields) {
      richRendered = true;
      var textPre = document.createElement('div');
      textPre.style.whiteSpace = 'pre-wrap';
      textPre.textContent = text;
      div.appendChild(textPre);
      div.appendChild(renderJOForm(extra.draft, extra.fields));
    }

    // Clickable blast cards for review
    if (extra.blasts && extra.blasts.length) {
      richRendered = true;
      var textPre2 = document.createElement('div');
      textPre2.style.whiteSpace = 'pre-wrap';
      textPre2.textContent = text;
      div.appendChild(textPre2);
      div.appendChild(renderBlastCards(extra.blasts));
    }
  }

  if (!richRendered) {
    div.innerHTML = md(text);
  }

  if (extra) {
    var choices = document.createElement('div');
    choices.className = 'choices';
    if (extra.choices) {
      extra.choices.forEach(function(c) {
        var b = document.createElement('button');
        b.className = 'btn sm';
        b.textContent = c;
        b.onclick = function() { sendAction(extra.choiceAction, { category: c }, c); };
        choices.appendChild(b);
      });
    }
    if (extra.confirmButton) {
      var b = document.createElement('button');
      b.className = 'btn gold';
      b.textContent = '\u{1F680} ' + extra.confirmButton.label;
      b.onclick = function() { b.disabled = true; sendAction(extra.confirmButton.action, {}); };
      choices.appendChild(b);
    }
    if (choices.children.length) div.appendChild(choices);

    // Expandable recipient list in blast preview
    if (extra.confirmButton && extra.plan) {
      var toggle = renderRecipientToggle(extra.plan);
      if (toggle) div.appendChild(toggle);
    }
  }
  chat.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function handleReply(r) {
  if (r.error) { addMsg('tom', r.text || r.error); return; }
  session = r.sessionId;
  addMsg('tom', r.text, r);
}

async function startPath(path) {
  document.querySelectorAll('.paths button').forEach(function(b) {
    b.classList.toggle('on', b.dataset.path === path);
  });
  document.getElementById('chat').innerHTML = '';
  document.getElementById('composer').style.display = path === 'review' ? 'none' : 'flex';
  var r = await api('/api/tom/start', { method: 'POST', body: { path } });
  handleReply(r);
}

function tryStartPath(path) {
  if (session) {
    if (!confirm('Starting a new task will end the current one. Continue?')) return;
  }
  session = null;
  startPath(path);
}

async function sendText() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!session) return;
  // If a gold confirm button is visible, trigger it instead of sending text
  var goldBtn = document.querySelector('.choices .btn.gold:not([disabled])');
  if (goldBtn) { input.value = ''; goldBtn.click(); return; }
  if (!text) return;
  input.value = '';
  addMsg('me', text);
  var r = await api('/api/tom/message', { method: 'POST', body: { sessionId: session, text: text } });
  handleReply(r);
}

async function sendAction(action, payload, label) {
  if (label) addMsg('me', label);
  var r = await api('/api/tom/message', { method: 'POST', body: { sessionId: session, action: action, payload: payload } });
  handleReply(r);
}

document.querySelectorAll('.paths button').forEach(function(b) { b.addEventListener('click', function() { tryStartPath(b.dataset.path); }); });
document.getElementById('send').addEventListener('click', sendText);
document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});
document.getElementById('attach').addEventListener('click', function() { document.getElementById('fileinput').click(); });
document.getElementById('fileinput').addEventListener('change', async function(e) {
  var file = e.target.files[0];
  if (!file || !session) return;
  addMsg('me', '\u{1F4CE} ' + file.name);
  var fd = new FormData();
  fd.append('sessionId', session);
  fd.append('file', file);
  var res = await fetch('/api/tom/upload', { method: 'POST', body: fd });
  handleReply(await res.json());
  e.target.value = '';
});

boot('tom');
</script>
</body></html>
