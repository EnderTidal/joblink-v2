<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JobLink — Log in</title>
<link rel="stylesheet" href="/app.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login { width:340px; }
  .login h1 { color:var(--blue); text-align:center; margin-bottom:6px; }
  .login p.sub { text-align:center; color:var(--mut); font-size:.88rem; margin-bottom:18px; }
  .err { color:#b3261e; font-size:.86rem; margin-bottom:10px; display:none; }
</style></head>
<body>
<form class="card login" id="f">
  <h1>JobLink</h1>
  <p class="sub">Self-selected candidates for your job orders</p>
  <div class="err" id="err">Wrong username or password.</div>
  <label class="f">Username<input id="u" autocomplete="username" required></label>
  <label class="f">Password<input id="p" type="password" autocomplete="current-password" required></label>
  <button class="btn" style="width:100%">Log in</button>
</form>
<script src="/app.js?v=2"></script>
<script>
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const r = await api('/api/login', { method: 'POST', body: { username: u.value, password: p.value } });
    if (r.needsOnboarding) { location.href = '/onboarding.html'; return; }
    if (r.defaultPassword) alert('You are using the default password. Please change it in Admin → Users.');
    location.href = '/tom.html';
  } catch { document.getElementById('err').style.display = 'block'; }
});
</script>
</body></html>
